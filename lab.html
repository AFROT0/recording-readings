<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعمل — تسجيل الجرعات</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <div class="container">
        <div id="labSection" class="section active">
            <div class="header-controls">
                <button type="button" class="back-btn">← رجوع</button>
                <h2 class="section-title">المعمل</h2>
                <button type="button" id="themeToggle" class="theme-toggle-btn" onclick="toggleTheme()"
                    aria-label="تبديل الوضع الليلي"><i class="fas fa-moon"></i></button>
            </div>
            <div class="lab-content-wrapper" id="labContentWrapper">
                <div class="wrapper" style="padding: 0.5rem 0.2rem;">
                    <div class="lab-header-bar">
                        <div class="lab-title-block">
                            <span class="lab-title-main">جدول جرعات طلمبات حقن الشبه</span>
                            <span class="lab-title-sub">مدير المعمل : د سالي</span>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button type="button" class="btn btn-print-lab" onclick="window.print()" title="طباعة الجدول">
                                <i class="fas fa-print"></i> طباعة
                            </button>
                            <button type="button" class="btn btn-save lab-header-save" onclick="saveLabData()"
                                title="يُحفظ تلقائياً أثناء التعديل؛ هذا الزر للتأكيد اليدوي">
                                <i class="fas fa-save"></i> حفظ البيانات
                            </button>
                        </div>
                    </div>

                    <div class="lab-table-wrap">
                        <table>
                            <colgroup>
                                <col style="width:14%">
                                <col style="width:17%">
                                <col style="width:17%">
                                <col style="width:17%">
                                <col style="width:17%">
                                <col style="width:18%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th rowspan="2" class="col-pump">رقم</th>
                                    <th rowspan="2" class="col-4">4 طلمبات</th>
                                    <th colspan="2" class="col-3-group-head">3 طلمبات</th>
                                    <th rowspan="2" class="col-2">طلمبتان</th>
                                    <th rowspan="2" class="col-1">طلمبة</th>
                                </tr>
                                <tr>
                                    <th class="col-3a">تصرف: <input id="labDischargeLabelA"
                                            class="lab-discharge-label-input" type="text" placeholder="—" maxlength="28"
                                            dir="auto" lang="en" oninput="convertInputToEnglish(this)" /></th>
                                    <th class="col-3b">تصرف: <input id="labDischargeLabelB"
                                            class="lab-discharge-label-input" type="text" placeholder="—" maxlength="28"
                                            dir="auto" lang="en" oninput="convertInputToEnglish(this)" /></th>
                                </tr>
                            </thead>
                            <tbody id="labTableBody" lang="en" dir="ltr"></tbody>
                            <tfoot>
                                <tr class="total-row">
                                    <td class="total-label">إجمالي الكلور</td>
                                    <td><input class="chlorine-input" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" lang="en" dir="ltr" oninput="convertInputToEnglish(this)" /></td>
                                    <td><input class="chlorine-input" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" lang="en" dir="ltr" oninput="convertInputToEnglish(this)" /></td>
                                    <td><input class="chlorine-input" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" lang="en" dir="ltr" oninput="convertInputToEnglish(this)" /></td>
                                    <td><input class="chlorine-input" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" lang="en" dir="ltr" oninput="convertInputToEnglish(this)" /></td>
                                    <td><input class="chlorine-input" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" lang="en" dir="ltr" oninput="convertInputToEnglish(this)" /></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div id="successToast" class="success-toast">✓ تم الحفظ بنجاح</div>

    <script src="cordova.js"></script>
    <script>
        // Handle missing cordova.js gracefully in web version
        if (typeof cordova === 'undefined') {
            window.cordova = {
                platformId: 'browser',
                ready: function(callback) { callback(); }
            };
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/firebase-messaging.js"></script>
    <script>
        window.APP_ROLE = 'lab_manager';
        window.APP_BOOT_MODE = 'lab';
    </script>
    <script src="js/app.js"></script>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeToggleBtn = document.getElementById('themeToggle');
            if (!themeToggleBtn) return;
            const icon = themeToggleBtn.querySelector('i');
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const savedTheme = localStorage.getItem('theme');
            const body = document.body;
            const themeToggleBtn = document.getElementById('themeToggle');
            if (themeToggleBtn && savedTheme === 'dark') {
                body.classList.add('dark-mode');
                const icon = themeToggleBtn.querySelector('i');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        });
    </script>
</body>

</html>
